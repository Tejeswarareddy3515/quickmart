apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickmart-api
  namespace: quickmart
  labels:
    app: quickmart-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: quickmart-api
  template:
    metadata:
      labels:
        app: quickmart-api
    spec:
      containers:
      - name: api
        image: quickmart/api:latest
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: quickmart-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: quickmart-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: quickmart-api-service
  namespace: quickmart
spec:
  selector:
    app: quickmart-api
  ports:
  - port: 80
    targetPort: 3001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quickmart-api-hpa
  namespace: quickmart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quickmart-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
