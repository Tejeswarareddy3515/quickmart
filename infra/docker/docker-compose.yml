version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: quickmart-postgres
    environment:
      POSTGRES_USER: quickmart
      POSTGRES_PASSWORD: quickmart_secret
      POSTGRES_DB: quickmart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickmart"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: quickmart-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # MongoDB (for AI/Analytics)
  mongodb:
    image: mongo:6
    container_name: quickmart-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # Backend API
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: quickmart-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://quickmart:quickmart_secret@postgres:5432/quickmart?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../../apps/api:/app
      - /app/node_modules

  # Frontend Web
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: quickmart-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:3001
    depends_on:
      - api

  # Admin Panel
  admin:
    build:
      context: ../../apps/admin
      dockerfile: Dockerfile
    container_name: quickmart-admin
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:3001
    depends_on:
      - api

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: quickmart-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
      - admin

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: quickmart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: quickmart-grafana
    ports:
      - "3003:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  prometheus_data:
  grafana_data:
